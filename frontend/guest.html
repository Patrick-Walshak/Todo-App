<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guest Todos — TodoApp</title>

  <link rel="stylesheet" href="/todo-frontend/src/output.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
</head>

<body class="min-h-screen bg-[#0D1F23] text-[#AFB3B7] font-['DM_Sans'] relative overflow-x-hidden">

  <!-- Background Glow -->
  <div class="fixed inset-0 overflow-hidden -z-10">
    <div class="absolute top-[-120px] left-[-120px] w-[350px] h-[350px] bg-[#132E35] opacity-40 blur-3xl rounded-full"></div>
    <div class="absolute bottom-[-120px] right-[-120px] w-[350px] h-[350px] bg-[#2D4A53] opacity-30 blur-3xl rounded-full"></div>
  </div>

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 border-b border-[#2D4A53] bg-[#132E35]/90 backdrop-blur-md">

    <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between">

      <!-- Logo -->
      <div class="font-['Syne'] text-2xl font-extrabold tracking-tight text-[#AFB3B7]">
        Todo<span class="text-[#69818D]">.</span>
      </div>

      <!-- Nav Buttons -->
      <div class="flex items-center gap-3">

        <a
          href="index.html"
          class="border border-[#2D4A53] text-[#69818D] hover:text-[#AFB3B7] hover:border-[#69818D] px-4 py-2 rounded-xl text-sm transition-all duration-200"
        >
          Sign In
        </a>

        <a
          href="register.html"
          class="bg-[#2D4A53] hover:bg-[#3a5f6e] text-[#AFB3B7] px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200"
        >
          Create Account
        </a>

      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="max-w-4xl mx-auto px-5 py-10">

    <!-- Header -->
    <div class="mb-10">

      <div
        class="inline-flex items-center gap-2 border border-[#2D4A53] bg-[#132E35] text-[#69818D] rounded-full px-4 py-1.5 text-xs mb-5"
      >
        🌐 Public Board
      </div>

      <h1 class="font-['Syne'] text-4xl font-extrabold tracking-tight text-[#AFB3B7] mb-3">
        Guest Todos
      </h1>

      <p class="text-sm text-[#69818D]">
        Anyone can view and post here. No account needed.
      </p>

    </div>

    <!-- Create Todo Card -->
    <div
      class="bg-[#132E35]/95 border border-[#2D4A53] rounded-3xl p-6 md:p-8 shadow-2xl backdrop-blur-sm mb-10"
    >

      <h2 class="font-['Syne'] text-xl font-bold text-[#AFB3B7] mb-6">
        Post a Public Todo
      </h2>

      <!-- Error -->
      <div
        class="hidden mb-4 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300"
        id="createError"
      ></div>

      <!-- Success -->
      <div
        class="hidden mb-4 rounded-xl border border-green-500/30 bg-green-500/10 px-4 py-3 text-sm text-green-300"
        id="createSuccess"
      ></div>

      <!-- Title -->
      <input
        type="text"
        id="newTitle"
        placeholder="What's on your mind?"
        class="w-full rounded-xl border border-[#2D4A53] bg-[#0D1F23] px-4 py-3.5 text-[#AFB3B7] placeholder:text-[#5A636A] outline-none transition-all duration-200 focus:border-[#69818D] focus:ring-2 focus:ring-[#69818D]/20 mb-4"
      />

      <!-- Body -->
      <textarea
        id="newBody"
        rows="3"
        placeholder="Add some details..."
        class="w-full rounded-xl border border-[#2D4A53] bg-[#0D1F23] px-4 py-3.5 text-[#AFB3B7] placeholder:text-[#5A636A] outline-none transition-all duration-200 focus:border-[#69818D] focus:ring-2 focus:ring-[#69818D]/20 mb-5 resize-none"
      ></textarea>

      <!-- Button -->
      <button
        class="bg-[#2D4A53] hover:bg-[#3a5f6e] active:scale-[0.98] transition-all duration-200 px-6 py-3 rounded-xl font-['Syne'] text-sm font-bold tracking-wide text-[#AFB3B7] disabled:opacity-50 disabled:cursor-not-allowed"
        id="addBtn"
        onclick="createTodo()"
      >
        + Post Publicly
      </button>

    </div>

    <!-- Section Header -->
    <div class="flex items-center justify-between mb-5">

      <h2 class="font-['Syne'] text-2xl font-bold text-[#AFB3B7]">
        Public Board
      </h2>

      <div
        class="bg-[#2D4A53] text-[#69818D] text-xs font-semibold px-4 py-1.5 rounded-full"
        id="countBadge"
      >
        0
      </div>

    </div>

    <!-- Todo List -->
    <div class="space-y-4" id="todoList">

      <div class="text-center py-20 text-[#5A636A]">

        <div class="text-5xl mb-4 opacity-60">
          🌐
        </div>

        <div class="text-sm">
          Loading public todos...
        </div>

      </div>

    </div>

  </main>

  <script src="js/api.js"></script>

  <script>
    let todos = [];

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function escHtml(str) {
      return str
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }

    function renderTodos() {

      const list = document.getElementById('todoList');

      document.getElementById('countBadge').textContent = todos.length;

      if (todos.length === 0) {

        list.innerHTML = `
          <div class="text-center py-20 text-[#5A636A]">
            <div class="text-5xl mb-4 opacity-60">📋</div>
            <div class="text-sm">
              No public todos yet. Be the first to post!
            </div>
          </div>
        `;

        return;
      }

      list.innerHTML = todos.map(todo => `
        <div class="bg-[#132E35]/95 border border-[#2D4A53] hover:border-[#69818D] rounded-2xl p-6 transition-all duration-200 shadow-lg">

          <div class="font-['Syne'] text-lg font-semibold text-[#AFB3B7] mb-2">
            ${escHtml(todo.title)}
          </div>

          <div class="text-sm text-[#69818D] leading-relaxed">
            ${escHtml(todo.body)}
          </div>

          <div class="text-xs text-[#5A636A] mt-4">
            Posted ${formatDate(todo.created_at)}
          </div>

        </div>
      `).join('');
    }

    async function loadTodos() {

      try {

        const data = await api.getGuestTodos();

        todos = data.todos;

        renderTodos();

      } catch (err) {

        document.getElementById('todoList').innerHTML = `
          <div class="text-center py-20 text-[#5A636A]">
            <div class="text-sm">
              Failed to load todos. Please refresh.
            </div>
          </div>
        `;
      }
    }

    async function createTodo() {

      const title = document.getElementById('newTitle').value.trim();
      const body = document.getElementById('newBody').value.trim();

      const errorEl = document.getElementById('createError');
      const successEl = document.getElementById('createSuccess');

      const btn = document.getElementById('addBtn');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!title || !body) {

        errorEl.textContent = 'Title and details are required.';
        errorEl.style.display = 'block';

        return;
      }

      btn.disabled = true;
      btn.textContent = 'Posting...';

      try {

        const todo = await api.createGuestTodo({ title, body });

        todos.unshift(todo);

        renderTodos();

        document.getElementById('newTitle').value = '';
        document.getElementById('newBody').value = '';

        successEl.textContent = 'Posted successfully!';
        successEl.style.display = 'block';

        setTimeout(() => successEl.style.display = 'none', 3000);

      } catch (err) {

        errorEl.textContent = 'Failed to post. Please try again.';
        errorEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = '+ Post Publicly';
    }

    document.getElementById('newTitle').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') createTodo();
    });

    loadTodos();
  </script>

</body>
</html>
