<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guest Todos — TodoApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--c1:#0D1F23;--c2:#132E35;--c3:#2D4A53;--c4:#69818D;--c5:#AFB3B7;--c6:#5A636A;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background-color:var(--c1);font-family:'DM Sans',sans-serif;min-height:100vh;color:var(--c5);}
    nav{background:var(--c2);border-bottom:1px solid var(--c3);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
    .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--c5);}
    .logo span{color:var(--c4);}
    .nav-right{display:flex;gap:12px;}
    .nav-btn{background:transparent;border:1px solid var(--c3);color:var(--c4);border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;}
    .nav-btn:hover{border-color:var(--c4);color:var(--c5);}
    .nav-btn.primary{background:var(--c3);color:var(--c5);border-color:var(--c3);}
    .nav-btn.primary:hover{background:#3a5f6e;}
    main{max-width:760px;margin:0 auto;padding:40px 24px;}
    .page-header{margin-bottom:32px;}
    .page-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--c5);margin-bottom:8px;}
    .page-subtitle{color:var(--c4);font-size:14px;}
    .guest-badge{display:inline-flex;align-items:center;gap:6px;background:var(--c2);border:1px solid var(--c3);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--c4);margin-bottom:20px;}
    .create-card{background:var(--c2);border:1px solid var(--c3);border-radius:16px;padding:28px;margin-bottom:32px;}
    .create-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--c5);margin-bottom:20px;}
    input,textarea{width:100%;background:var(--c1);border:1px solid var(--c3);border-radius:10px;padding:13px 16px;color:var(--c5);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:12px;resize:none;}
    input:focus,textarea:focus{border-color:var(--c4);}
    input::placeholder,textarea::placeholder{color:var(--c6);}
    .add-btn{background:var(--c3);color:var(--c5);border:none;border-radius:10px;padding:12px 24px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;}
    .add-btn:hover{background:#3a5f6e;}
    .add-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--c5);}
    .count-badge{background:var(--c3);color:var(--c4);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;}
    .todo-list{display:flex;flex-direction:column;gap:12px;}
    .todo-card{background:var(--c2);border:1px solid var(--c3);border-radius:14px;padding:20px 24px;transition:border-color 0.2s;}
    .todo-card:hover{border-color:var(--c4);}
    .todo-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:var(--c5);margin-bottom:6px;}
    .todo-body{font-size:13px;color:var(--c4);line-height:1.5;}
    .todo-meta{font-size:11px;color:var(--c6);margin-top:10px;}
    .empty{text-align:center;padding:60px 20px;color:var(--c6);}
    .empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5;}
    .error-toast{background:#3b1a1a;border:1px solid #7a2a2a;color:#f87171;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:20px;display:none;}
    .success-toast{background:#1a3b2a;border:1px solid #2a7a4a;color:#6ee7a0;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:20px;display:none;}
  </style>
</head>
<body>
  <nav>
    <div class="logo">Todo<span>.</span></div>
    <div class="nav-right">
      <a href="index.html" class="nav-btn">Sign In</a>
      <a href="register.html" class="nav-btn primary">Create Account</a>
    </div>
  </nav>
  <main>
    <div class="page-header">
      <div class="guest-badge">🌐 Public Board</div>
      <div class="page-title">Guest Todos</div>
      <div class="page-subtitle">Anyone can view and post here. No account needed.</div>
    </div>
    <div class="create-card">
      <div class="create-title">Post a Public Todo</div>
      <div class="error-toast" id="createError"></div>
      <div class="success-toast" id="createSuccess"></div>
      <input type="text" id="newTitle" placeholder="What's on your mind?" />
      <textarea id="newBody" rows="2" placeholder="Add some details..."></textarea>
      <button class="add-btn" id="addBtn" onclick="createTodo()">+ Post Publicly</button>
    </div>
    <div class="section-header">
      <div class="section-title">Public Board</div>
      <div class="count-badge" id="countBadge">0</div>
    </div>
    <div class="todo-list" id="todoList">
      <div class="empty"><div class="empty-icon">🌐</div><div>Loading public todos...</div></div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script>
    let todos=[];
    function formatDate(iso){return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
    function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function renderTodos(){
      const list=document.getElementById('todoList');
      document.getElementById('countBadge').textContent=todos.length;
      if(todos.length===0){list.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div>No public todos yet. Be the first to post!</div></div>';return;}
      list.innerHTML=todos.map(todo=>`
        <div class="todo-card">
          <div class="todo-title">${escHtml(todo.title)}</div>
          <div class="todo-body">${escHtml(todo.body)}</div>
          <div class="todo-meta">Posted ${formatDate(todo.created_at)}</div>
        </div>`).join('');
    }
    async function loadTodos(){
      try{const data=await api.getGuestTodos();todos=data.todos;renderTodos();}
      catch(err){document.getElementById('todoList').innerHTML='<div class="empty"><div>Failed to load. Please refresh.</div></div>';}
    }
    async function createTodo(){
      const title=document.getElementById('newTitle').value.trim();
      const body=document.getElementById('newBody').value.trim();
      const errorEl=document.getElementById('createError');
      const successEl=document.getElementById('createSuccess');
      const btn=document.getElementById('addBtn');
      errorEl.style.display='none';successEl.style.display='none';
      if(!title||!body){errorEl.textContent='Title and details are required.';errorEl.style.display='block';return;}
      btn.disabled=true;btn.textContent='Posting...';
      try{
        const todo=await api.createGuestTodo({title,body});
        todos.unshift(todo);renderTodos();
        document.getElementById('newTitle').value='';
        document.getElementById('newBody').value='';
        successEl.textContent='Posted successfully!';successEl.style.display='block';
        setTimeout(()=>successEl.style.display='none',3000);
      }catch(err){errorEl.textContent='Failed to post. Please try again.';errorEl.style.display='block';}
      btn.disabled=false;btn.textContent='+ Post Publicly';
    }
    document.getElementById('newTitle').addEventListener('keydown',(e)=>{if(e.key==='Enter')createTodo();});
    loadTodos();
  </script>
</body>
</html>
