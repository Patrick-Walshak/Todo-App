<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — TodoApp</title>

  <link rel="stylesheet" href="/todo-frontend/src/output.css">

  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
</head>

<body class="min-h-screen bg-[#0D1F23] flex items-center justify-center px-4 py-10 relative overflow-hidden font-['DM_Sans']">

  <!-- Background Glow -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-[-120px] right-[-120px] w-[350px] h-[350px] bg-[#132E35] opacity-40 blur-3xl rounded-full"></div>
    <div class="absolute bottom-[-120px] left-[-120px] w-[350px] h-[350px] bg-[#2D4A53] opacity-30 blur-3xl rounded-full"></div>
  </div>

  <!-- Card --> 
  <div
    class="relative z-10 w-full max-w-lg bg-[#132E35]/95 border border-[#2D4A53] rounded-3xl p-8 md:p-10 shadow-2xl backdrop-blur-sm"
  >

    <!-- Logo -->
    <div class="mb-8">
      <h1 class="font-['Syne'] text-4xl font-extrabold tracking-tight text-[#AFB3B7]">
        Todo<span class="text-[#69818D]">.</span>
      </h1>

      <p class="text-sm text-[#69818D] mt-2">
        Create your account
      </p>
    </div>

    <!-- Error -->
    <div
      class="hidden mb-5 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300"
      id="error"
    ></div>

    <!-- Success -->
    <div
      class="hidden mb-5 rounded-xl border border-green-500/30 bg-green-500/10 px-4 py-3 text-sm text-green-300"
      id="success"
    ></div>

    <!-- Form -->
    <form id="registerForm" class="space-y-5">

      <!-- Name Row -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

        <!-- First Name -->
        <div>
          <label
            class="block text-xs uppercase tracking-[0.2em] text-[#69818D] font-medium mb-2"
          >
            First Name
          </label>

          <input
            type="text"
            id="first_name"
            placeholder="Jane"
            required
            class="w-full rounded-xl border border-[#2D4A53] bg-[#0D1F23] px-4 py-3.5 text-[#AFB3B7] placeholder:text-[#5A636A] outline-none transition-all duration-200 focus:border-[#69818D] focus:ring-2 focus:ring-[#69818D]/20"
          />
        </div>

        <!-- Last Name -->
        <div>
          <label
            class="block text-xs uppercase tracking-[0.2em] text-[#69818D] font-medium mb-2"
          >
            Last Name
          </label>

          <input
            type="text"
            id="last_name"
            placeholder="Doe"
            required
            class="w-full rounded-xl border border-[#2D4A53] bg-[#0D1F23] px-4 py-3.5 text-[#AFB3B7] placeholder:text-[#5A636A] outline-none transition-all duration-200 focus:border-[#69818D] focus:ring-2 focus:ring-[#69818D]/20"
          />
        </div>

      </div>

      <!-- Email -->
      <div>
        <label
          class="block text-xs uppercase tracking-[0.2em] text-[#69818D] font-medium mb-2"
        >
          Email
        </label>

        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          required
          class="w-full rounded-xl border border-[#2D4A53] bg-[#0D1F23] px-4 py-3.5 text-[#AFB3B7] placeholder:text-[#5A636A] outline-none transition-all duration-200 focus:border-[#69818D] focus:ring-2 focus:ring-[#69818D]/20"
        />
      </div>

      <!-- Password -->
      <div>
        <label
          class="block text-xs uppercase tracking-[0.2em] text-[#69818D] font-medium mb-2"
        >
          Password
        </label>

        <input
          type="password"
          id="password"
          placeholder="Min. 8 characters"
          required
          minlength="8"
          class="w-full rounded-xl border border-[#2D4A53] bg-[#0D1F23] px-4 py-3.5 text-[#AFB3B7] placeholder:text-[#5A636A] outline-none transition-all duration-200 focus:border-[#69818D] focus:ring-2 focus:ring-[#69818D]/20"
        />
      </div>

      <!-- Submit Button -->
      <button
        class="w-full rounded-xl bg-[#2D4A53] hover:bg-[#3a5f6e] active:scale-[0.98] transition-all duration-200 py-3.5 font-['Syne'] text-sm font-bold tracking-wide text-[#AFB3B7] disabled:opacity-50 disabled:cursor-not-allowed"
        type="submit"
        id="submitBtn"
      >
        Create Account
      </button>
    </form>

    <!-- Footer -->
    <div class="mt-7 text-center text-sm text-[#69818D]">
      Already have an account?

      <a
        href="index.html"
        class="text-[#AFB3B7] font-medium border-b border-[#2D4A53] hover:border-[#AFB3B7] transition-all"
      >
        Sign in
      </a>
    </div>
  </div>

  <script src="js/api.js"></script>

  <script>
    if (api.isLoggedIn()) window.location.href = 'todos.html';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        await api.register({
          first_name: document.getElementById('first_name').value,
          last_name: document.getElementById('last_name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });

        successEl.textContent = 'Account created! Redirecting to login...';
        successEl.style.display = 'block';

        setTimeout(() => window.location.href = 'index.html', 1500);

      } catch (err) {

        let msg = 'Something went wrong.';

        if (err.status === 409) {
          msg = 'An account with this email already exists.';
        } else if (Array.isArray(err.detail)) {
          msg = err.detail.map(e => e.message).join(' ');
        } else if (typeof err.detail === 'string') {
          msg = err.detail;
        }

        errorEl.textContent = msg;
        errorEl.style.display = 'block';

        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>

</body>
</html>
