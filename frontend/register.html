<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — TodoApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--c1:#0D1F23;--c2:#132E35;--c3:#2D4A53;--c4:#69818D;--c5:#AFB3B7;--c6:#5A636A;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background-color:var(--c1);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:var(--c2);border:1px solid var(--c3);border-radius:20px;padding:48px 40px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,0.4);}
    .logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--c5);margin-bottom:8px;}
    .logo span{color:var(--c4);}
    .subtitle{color:var(--c4);font-size:14px;margin-bottom:36px;}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    label{display:block;font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--c4);margin-bottom:8px;}
    input{width:100%;background:var(--c1);border:1px solid var(--c3);border-radius:10px;padding:14px 16px;color:var(--c5);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;margin-bottom:20px;}
    input:focus{border-color:var(--c4);}
    input::placeholder{color:var(--c6);}
    .btn{width:100%;background:var(--c3);color:var(--c5);border:none;border-radius:10px;padding:15px;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:4px;}
    .btn:hover{background:#3a5f6e;}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .error{background:#3b1a1a;border:1px solid #7a2a2a;color:#f87171;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:20px;display:none;}
    .success{background:#1a3b2a;border:1px solid #2a7a4a;color:#6ee7a0;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:20px;display:none;}
    .link-row{text-align:center;margin-top:24px;color:var(--c4);font-size:14px;}
    .link-row a{color:var(--c5);text-decoration:none;font-weight:500;border-bottom:1px solid var(--c3);}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Todo<span>.</span></div>
    <div class="subtitle">Create your account</div>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <form id="registerForm">
      <div class="row">
        <div><label>First Name</label><input type="text" id="first_name" placeholder="Jane" required /></div>
        <div><label>Last Name</label><input type="text" id="last_name" placeholder="Doe" required /></div>
      </div>
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" />
      <button class="btn" type="submit" id="submitBtn">Create Account</button>
    </form>
    <div class="link-row">Already have an account? <a href="index.html">Sign in</a></div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if(api.isLoggedIn()) window.location.href='todos.html';
    document.getElementById('registerForm').addEventListener('submit',async(e)=>{
      e.preventDefault();
      const btn=document.getElementById('submitBtn');
      const errorEl=document.getElementById('error');
      const successEl=document.getElementById('success');
      errorEl.style.display='none';successEl.style.display='none';
      btn.disabled=true;btn.textContent='Creating account...';
      try{
        await api.register({
          first_name:document.getElementById('first_name').value,
          last_name:document.getElementById('last_name').value,
          email:document.getElementById('email').value,
          password:document.getElementById('password').value,
        });
        successEl.textContent='Account created! Redirecting...';
        successEl.style.display='block';
        setTimeout(()=>window.location.href='index.html',1500);
      }catch(err){
        let msg='Something went wrong.';
        if(err.status===409) msg='Email already exists.';
        else if(Array.isArray(err.detail)) msg=err.detail.map(e=>e.message).join(' ');
        else if(typeof err.detail==='string') msg=err.detail;
        errorEl.textContent=msg;errorEl.style.display='block';
        btn.disabled=false;btn.textContent='Create Account';
      }
    });
  </script>
</body>
</html>
